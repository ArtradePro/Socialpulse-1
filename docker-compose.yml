version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: socialpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  server:
    build: ./socialPulse-app/backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/socialpulse
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TWITTER_API_KEY: ${TWITTER_API_KEY}
      TWITTER_API_SECRET: ${TWITTER_API_SECRET}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./socialPulse-app/backend:/app
      - /app/node_modules

  client:
    build: ./socialPulse-app/frontend
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./socialPulse-app/frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
