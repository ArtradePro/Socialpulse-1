name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: socialpulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      JWT_EXPIRES_IN: 7d
      TEST_DATABASE_URL: postgresql://postgres:password@localhost:5432/socialpulse_test
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: socialPulse-app/backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: socialPulse-app/backend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: socialPulse-app/backend

      - name: Run integration tests
        run: npm test
        working-directory: socialPulse-app/backend

  frontend:
    name: Frontend — typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: socialPulse-app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: socialPulse-app/frontend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: socialPulse-app/frontend

  mobile:
    name: Mobile — typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: socialPulse-app/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: socialPulse-app/mobile

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: socialPulse-app/mobile

  deploy:
    name: Deploy — build & push to VPS
    runs-on: ubuntu-latest
    needs: [backend, frontend, mobile]
    # Only deploy on pushes to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: socialPulse-app/backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/socialpulse-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: socialPulse-app/frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/socialpulse-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/socialpulse

            # Pull latest images
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/socialpulse-backend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/socialpulse-frontend:latest

            # Run pending migrations before restarting the server
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm migrate

            # Rolling restart — zero-downtime
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build

            # Remove dangling images to keep disk usage in check
            docker image prune -f
