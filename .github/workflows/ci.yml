name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: socialpulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      JWT_EXPIRES_IN: 7d
      TEST_DATABASE_URL: postgresql://postgres:password@localhost:5432/socialpulse_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: socialPulse-app/backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: socialPulse-app/backend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: socialPulse-app/backend

      - name: Run integration tests
        run: npm test
        working-directory: socialPulse-app/backend

  frontend:
    name: Frontend — typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: socialPulse-app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: socialPulse-app/frontend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: socialPulse-app/frontend

  mobile:
    name: Mobile — typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: socialPulse-app/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: socialPulse-app/mobile

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: socialPulse-app/mobile
